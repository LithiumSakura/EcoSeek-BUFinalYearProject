name: Deploy Backend to Azure

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'   # Only triggers when backend code changes
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build backend/MyApi/MyApi.csproj --configuration Release

      - name: Publish
        run: dotnet publish backend/MyApi/MyApi.csproj --configuration Release --output ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ecoseek-project'
          slot-name: 'production'
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./publish
