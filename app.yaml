runtime: python311

instance_class: F1

entrypoint: gunicorn -b :$PORT main:application

env_variables:
  GOOGLE_CLOUD_PROJECT: 'ecoseek-buproject-f015d'
  SECRET_KEY: 'pineapple-cherry-kuromi-scrunchie-cards'

handlers:
  - url: /static
    static_dir: static
    secure: always

  - url: /.*
    script: auto
    secure: always

automatic_scaling:
  min_instances: 0
  max_instances: 2
  target_cpu_utilization: 0.65