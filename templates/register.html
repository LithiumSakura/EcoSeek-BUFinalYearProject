{% extends "base.html" %}
{% block title %}Sign Up — EcoSeek{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">🌱</div>
    <h1 class="auth-title">Start your adventure!</h1>
    <p class="auth-sub">Create your free EcoSeek account</p>

    <div id="error-msg" class="error-banner hidden"></div>
    <div id="success-msg" class="success-banner hidden"></div>

    <div class="form-group">
      <label for="username">Explorer name</label>
      <input type="text" id="username" placeholder="e.g. NatureNinja" class="form-input" maxlength="20"/>
      <span class="form-hint">3–20 characters, letters and numbers only</span>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="your@email.com" class="form-input" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="At least 8 characters" class="form-input" />
    </div>

    <button class="btn-primary btn-full" onclick="registerUser()">Create Account 🚀</button>

    <div class="auth-divider"><span>or</span></div>

    <button class="btn-google btn-full" onclick="googleLogin()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20"/>
      Continue with Google
    </button>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

{% block extra_scripts %}
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDMKH7ZLgRdT9BGmjDmjU93XJNNScB2Z9w",
    authDomain: "ecoseek-individualproject.firebaseapp.com",
    projectId: "ecoseek-individualproject",
    storageBucket: "ecoseek-individualproject.firebasestorage.app",
    messagingSenderId: "352328535082",
    appId: "1:352328535082:web:f00621bfa17e933e2e4753"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  async function registerUser() {
    const username = document.getElementById("username").value.trim();
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    const resp = await fetch("/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, email, password })
    });
    const data = await resp.json();
    if (resp.ok) {
      showSuccess("Account created! Logging you in...");
      // Auto-login after register
      const cred  = await auth.signInWithEmailAndPassword(email, password);
      const token = await cred.user.getIdToken();
      const r2    = await fetch("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id_token: token })
      });
      const d2 = await r2.json();
      if (d2.redirect) window.location.href = d2.redirect;
    } else {
      showError(data.error);
    }
  }

  async function googleLogin() {
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      const cred     = await auth.signInWithPopup(provider);
      const token    = await cred.user.getIdToken();
      const resp     = await fetch("/auth/google-callback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id_token: token })
      });
      const data = await resp.json();
      if (data.redirect) window.location.href = data.redirect;
      else showError(data.error);
    } catch (e) { showError(e.message); }
  }

  function showError(msg) {
    const el = document.getElementById("error-msg");
    el.textContent = msg;
    el.classList.remove("hidden");
    document.getElementById("success-msg").classList.add("hidden");
  }
  function showSuccess(msg) {
    const el = document.getElementById("success-msg");
    el.textContent = msg;
    el.classList.remove("hidden");
    document.getElementById("error-msg").classList.add("hidden");
  }
</script>
{% endblock %}
{% endblock %}
