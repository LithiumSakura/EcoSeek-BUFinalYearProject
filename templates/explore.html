{% extends "base.html" %}
{% block title %}Explore — EcoSeek{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  #map { height: 380px; width: 100%; border-radius: 16px; z-index: 1; }
</style>
{% endblock %}

{% block content %}
<div class="explore-page">
  <div class="explore-header">
    <h1>🗺️ Nature Near You</h1>
    <p>See what other explorers have spotted!</p>
  </div>

  <div id="map"></div>

  <div class="explore-list" style="margin-top:24px;">
    <h2 class="card-title">Recent Sightings</h2>
    <div id="nearby-list" class="sighting-list">
      <p class="empty-msg">Loading...</p>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // Category emoji map
  const emojiMap = { bird:"🐦", insect:"🦋", plant:"🌸", animal:"🦊", other:"🌿" };

  // Initialise Leaflet map centred on UK
  const map = L.map("map").setView([52.5, -1.5], 6);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 18
  }).addTo(map);

  // Try to centre on user's location
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      map.setView([pos.coords.latitude, pos.coords.longitude], 13);
    });
  }

  // Load sightings from API and plot markers
  fetch("/api/nearby")
    .then(r => r.json())
    .then(data => {
      const listEl = document.getElementById("nearby-list");

      if (!data.length) {
        listEl.innerHTML = '<p class="empty-msg">No sightings yet — be the first! 🌿</p>';
        return;
      }

      // Plot each sighting as a map marker
      data.forEach(s => {
        if (s.lat && s.lng) {
          const emoji = emojiMap[s.category] || "🌿";
          const icon  = L.divIcon({
            html: `<div style="font-size:24px;line-height:1">${emoji}</div>`,
            className: "",
            iconSize: [30, 30],
            iconAnchor: [15, 15]
          });
          L.marker([s.lat, s.lng], { icon })
            .addTo(map)
            .bindPopup(`<strong>${s.species}</strong><br>${s.category || "Nature"}`);
        }
      });

      // Render list
      listEl.innerHTML = data.map(s => `
        <div class="sighting-row">
          <div class="sighting-emoji">${emojiMap[s.category] || "🌿"}</div>
          <div class="sighting-info">
            <div class="sighting-name">${s.species}</div>
            <div class="sighting-meta">${s.category || "Nature"}</div>
          </div>
        </div>`).join("");
    })
    .catch(err => {
      document.getElementById("nearby-list").innerHTML =
        '<p class="empty-msg">Could not load sightings. Please try again later.</p>';
      console.error("Nearby fetch error:", err);
    });
</script>
{% endblock %}
